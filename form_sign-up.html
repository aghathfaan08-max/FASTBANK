<!DOCTYPE html>
<html>
    <head>
        <title>form sign-up</title>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body id="body-1">
        <h1 id="hero">form sign-up</h1>
        <p id="deskripsi">pastikan data yg anda tulis sebelum klik sign-up</p>
        <form id="form-login">
            <section class="section-1">
                <label for="name">nama</label>
                <input id="name" type="text" placeholder="masukkan nama">
            </section>
            <section class="section-1">
                <label for="password">password</label>
                <input id="password" type="password" placeholder="masukkan password">
            </section>
            
            <p id="info">sudah punya akun?</p>
            <a href="projek-form_login.html">login</a>
            <button type="submit" id="button">sign-up</button>
        </form>
        <script src="sign_up.js"></script>
    </body>
</html>
